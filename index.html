<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/culturama-favico.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap" rel="stylesheet"
    />
    <title>Pesquisa Online</title>
  </head>
  <body>

    <main>
      <header>
        <img src="img/logo-culturama.png" alt="logo culturama" />
        <h1>pesquisa de opinião </h1>
      </header>
  
      <section>
        <!-- <form action="sucesso.htm" method="get"></form> -->
        <form action="sucesso.html" method="get">
          <!-- dados pessoais -->
          <fieldset>
            <legend>Dados Pessoais</legend>
  
            <label for="userName">nome</label>
            <input type="text" id="userName" required />
            <br />
            <label for="userAge">idade</label>
            <input type="number" id="userAge" min="12" max="100" required />
            <br />
  
            <label for="birthDate">Data de nascimento</label>
            <input type="date" id="birthDate" />
            <br />
  
            <label for="userEmail">Email</label>
            <input type="email" id="userEmail" required />
            <br />
  
            <label for="userPhoneNumber">Telefone</label>
            <input
              type="tel"
              id="userPhoneNumber"
              pattern="[0-9]{11}"
              placeholder="DDD + numero sem espaços ou hifen" aria-describedby="phoneHelp"
            />
            <small id="phoneHelp">Preencha com 11 digitos no formato: DDD + numero sem espaco ou hifen</small>
            <br />
  
            <label for="userImage">Upload de fotos</label>
            <input type="file" accept="image/*" id="userImage" aria-describedby="imgHelp" />
            <small id="imgHelp" >Envie uma foto no formato PNG ou JPEG</small>
            <br />
          </fieldset>
  
          <fieldset>
            <legend>Perfil</legend>
            <p>Gênero:</p>
            <input id="fem" type="radio" name="userGender" value="Feminino" />
            <label for="fem">Feminino</label>
  
            <input id="mas" type="radio" name="userGender" value="Masculino" />
            <label for="mas">Masculino</label>
  
            <input
              id="notinformed"
              type="radio"
              name="userGender"
              value="notinformed"
            />
            <label for="notinformed">Prefiro não informar</label>
            <br />
  
            <label for="marialStatus">Estado civil</label>
            <select id="marialStatus" id="userMaritalStatus">
              <option value="notInformed">Selecione...</option>
              <option value="casado">casado</option>
              <option value="solteiro">solteiro</option>
              <option value="divorciado">divorciado</option>
              <option value="uniao_estavel">União Estável</option>
            </select>
  
            <label for="state">Estado</label>
            <select name="userStats" id="state">
              <option value=" Acre ">Acre</option>
              <option value=" Alagoas ">Alagoas</option>
              <option value=" Amapá ">Amapá</option>
              <option value=" Amazonas ">Amazonas</option>
              <option value=" Bahia ">Bahia</option>
              <option value=" Ceará ">Ceará</option>
              <option value=" Distrito Federal ">Distrito Federal</option>
              <option value=" Espirito Santo ">Espirito Santo</option>
              <option value=" Goiás ">Goiás</option>
              <option value=" Maranhão ">Maranhão</option>
              <option value=" Mato Grosso do Sul ">Mato Grosso do Sul</option>
              <option value=" Mato Grosso ">Mato Grosso</option>
              <option value=" Minas Gerais ">Minas Gerais</option>
              <option value=" Pará ">Pará</option>
              <option value=" Paraíba ">Paraíba</option>
              <option value=" Paraná ">Paraná</option>
              <option value=" Pernambuco ">Pernambuco</option>
              <option value=" Piauí ">Piauí</option>
              <option value=" Rio de Janeiro ">Rio de Janeiro</option>
              <option value=" Rio Grande do Norte ">Rio Grande do Norte</option>
              <option value=" Rio Grande do Sul ">Rio Grande do Sul</option>
              <option value=" Rondônia ">Rondônia</option>
              <option value=" Roraima ">Roraima</option>
              <option value=" Santa Catarina ">Santa Catarina</option>
              <option value=" São Paulo ">São Paulo</option>
              <option value=" Sergipe ">Sergipe</option>
              <option value=" Tocantins ">Tocantins</option>
            </select>
            <br />
            <label for="city">Cidade</label>
            <input type="text" id="city" name="userCity" required />
          </fieldset>
  
          <fieldset>
            <legend>Hábitos</legend>
  
            <p>Redes Sociais</p>
            <input
              id="instagram"
              type="checkbox"
              name="social"
              value="instagram"
            />
            <label for="instagram">Instagram</label>
            <br />
            <input id="facebook" type="checkbox" name="social" value="facebook" />
            <label for="facebook">Facebook</label>
            <br />
            <input id="linkedin" type="checkbox" name="social" value="linkedin" />
            <label for="linkedin">Linkedin</label>
            <br />
  
            <input id="x" type="checkbox" name="social" value="X" />
            <label for="x">X</label>
            <br />
  
            <label for="musicStyle">Estilo musical:</label>
            <input
              list="styleTypes"
              id="musicStyle"
              name="userMusicStyle"
              type="text"
            />
            <datalist id="styleTypes">
              <option value="Rock"></option>
              <option value="Pop"></option>
              <option value="Samba"></option>
              <option value="Sertanejo"></option>
            </datalist>
            <br />
  
            <label for="favoriteColor">Cor favorita</label>
            <input type="color" name="userFavoriteColor" id="favoriteColor" />
          </fieldset>
  
          <fieldset>
            <legend>Opinião</legend>
            <p>O que você ahca da qualidade do nosso serviço?</p>
  
            <input
              type="radio"
              id="otimo"
              name="userServiceOpnion"
              value="otima"
            />
            <label for="otimo">Ótima</label>
            <br />
            <input type="radio" id="boa" name="userServiceOpnion" value="boa" />
            <label for="boa">Boa</label>
            <br />
            <input
              type="radio"
              id="regular"
              name="userServiceOpnion"
              value="regular"
            />
            <label for="regular">Regular</label>
            <br />
            <input
              type="radio"
              id="ruim"
              name="userServiceOpnion"
              value="ruim"
            />
            <label for="ruim">Ruim</label>
            <br />
            <label for="comment">Escreva sua opinião:</label>
            <textarea
              id="comment"
              name="userComment"
              placeholder="Digite aqui..."
            ></textarea>
          </fieldset>
  
          <fieldset>
            <legend>Confirmações</legend>
  
            <input
              type="checkbox"
              name="userLgpd"
              id="userLgpdTerm"
              value="accepted"
              required
            />
            <label for="userLgpdTerm">Eu aceito participar da pesquisa</label
            ><br />
  
            <input
              type="checkbox"
              name="usergetResult"
              id="getResult"
              value="accepted"
            />
            <label for="getResult">Desejo receber o resultado por email</label
            ><br />
          </fieldset>
          <button type="submit">Enviar</button>
          <button type="reset">Limpar</button>
        </form>
      </section>

    </main>
    <script src="app.js"></script>
  </body>
</html>
